services:
  db:
    image: postgres:15-alpine
    container_name: luto_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: luto_curitiba
      TZ: America/Sao_Paulo
    ports:
      - "5432:5432"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: luto_backend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_started
    environment:
      DATABASE_URL: postgres://admin:adminpassword@db:5432/luto_curitiba
      PORT: 3000
      NODE_ENV: development
      FRONTEND_URL: http://localhost:5173
      TZ: America/Sao_Paulo

  frontend:
    build: ./frontend
    container_name: luto_frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:3000

volumes:
  pgdata:
